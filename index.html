<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄前 - 个人简历</title>
    <style>
        /* 基础重置与变量声明 */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* 深色背景与渐变光晕 */
        body {
            background-color: #0f172a; /* 深蓝色背景 */
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 制造玻璃拟态背后的色彩斑斓效果 */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
        .shape1 {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            top: -100px;
            left: -100px;
        }
        .shape2 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            bottom: 10%;
            right: 5%;
        }

        /* 主体网格容器 */
        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            z-index: 1;
        }

        /* 核心玻璃拟态卡片样式 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        /* 特定卡片布局分配 */
        .profile-card {
            grid-column: span 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .about-card {
            grid-column: span 2;
        }

        .skills-card {
            grid-column: span 2;
        }

        .contact-card {
            grid-column: span 1;
        }

        /* 图片样式 */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--glass-border);
            margin-bottom: 1rem;
            background-color: rgba(255,255,255,0.1); /* 图片未加载时的占位色 */
        }

        /* 排版样式 */
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #e2e8f0;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }
        p {
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin: 0.2rem;
            border: 1px solid var(--glass-border);
        }

        /* 响应式设计：在小屏幕上单列显示 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .profile-card, .about-card, .skills-card, .contact-card {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <main class="container">
        <section class="glass-card profile-card">
            <img src="xi.png" alt="黄前的头像" class="profile-img">
            <h1>黄前</h1>
            <p style="color: #cbd5e1; font-weight: bold;">前端开发 / 计算机科学</p>
            <p>热衷于代码与设计的结合。</p>
        </section>

        <section class="glass-card about-card">
            <h2>关于我</h2>
            <p>你好！我是黄前。我致力于通过技术创造优秀的用户体验。对现代 Web 开发、计算机图形学以及优雅的架构设计有着浓厚的兴趣。</p>
            <p>在这里你可以展示你的教育背景、过往经历或者是你的个人爱好。这段文字可以根据你的实际情况自由发挥，玻璃拟态的背景会自动适应文字的高度。</p>
        </section>

        <section class="glass-card skills-card">
            <h2>技术栈</h2>
            <div>
                <span class="tag">C++</span>
                <span class="tag">HTML / CSS</span>
                <span class="tag">JavaScript</span>
                <span class="tag">OpenGL</span>
                <span class="tag">算法与数据结构</span>
                <span class="tag">UI/UX 设计</span>
            </div>
        </section>

        <section class="glass-card contact-card">
            <h2>联系我</h2>
            <p>📧 Email: hello@example.com</p>
            <p>🐙 GitHub: @huangqian</p>
            <p>🌐 坐标: 台湾</p>
        </section>
    </main>

</body>
</html>
